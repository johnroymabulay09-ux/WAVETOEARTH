<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wave to Earth Invite</title>

<!-- ✅ FIXED FONT LINK -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Inter', sans-serif;
    overflow:hidden;

    /* ✅ LOCAL BACKGROUND (REPLACE DONE) */
    background:
      linear-gradient(rgba(0,0,0,.25), rgba(0,0,0,.55)),
     url("wte.jpg") /* 👈 IMPORTANT */

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* glass card */
.card{
    width:min(90%,520px);
    background:rgba(20,20,25,0.75);
    backdrop-filter:blur(14px);
    padding:35px;
    text-align:center;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
    color:white;
    position:relative;
}

/* typography */
h1{
    font-family:'Playfair Display', serif;
    font-size:26px;
    margin-bottom:10px;
}

.details{
    font-size:14px;
    opacity:.75;
    margin-bottom:20px;
}

p{
    font-size:15px;
    opacity:.85;
}

#emoji{
    font-size:50px;
    margin-bottom:15px;
    transition:.2s;
}

/* buttons */
.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

button{
    border:none;
    padding:12px 26px;
    border-radius:999px;
    font-size:15px;
    cursor:pointer;
    transition:.2s ease;
}

.yes{
    background:#22c55e;
    color:white;
    box-shadow:0 0 15px rgba(34,197,94,0.4);
}

.no{
    background:#e5e7eb;
    color:#111;
}

/* labels */
.label-top{
    position:absolute;
    top:12px;
    left:18px;
    font-size:12px;
    opacity:.5;
}

.label-bottom{
    position:absolute;
    bottom:12px;
    right:18px;
    font-size:12px;
    opacity:.5;
}

canvas{
    position:fixed;
    inset:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="card">

    <div class="label-top">wave to earth</div>
    <div class="label-bottom">seasons</div>

    <h1>Concert Date Invite</h1>

    <div class="details">
        Wave to Earth – The Pieces Tour<br>
        Nov 15, 2026 • MOA Arena
    </div>

    <div id="emoji">🌊</div>

    <p>Do you want to go with me?</p>

    <div class="buttons">
        <button class="yes" id="yesBtn" onclick="yesClick()">YES</button>
        <button class="no" id="noBtn">NO</button>
    </div>

</div>

<canvas id="confetti"></canvas>

<script>

let attempts = 0;
let isMoving = false;

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const emoji = document.getElementById("emoji");

const moods = ["🌊","🌙","☁️","🎧","🫧","💭","😐"];

/* ✅ SINGLE EVENT (fix bug) */
noBtn.onclick = moveNo;

function moveNo(){

    if(isMoving) return;
    isMoving = true;

    setTimeout(() => isMoving = false, 250);

    attempts++;

    emoji.textContent = moods[Math.floor(Math.random()*moods.length)];

    /* NO shrink */
    const shrink = Math.max(0.3, 1 - attempts*0.05);
    noBtn.style.transform = `scale(${shrink})`;

    /* YES exponential */
    const scale = Math.min(5, Math.pow(1.15, attempts));
    yesBtn.style.transform = `scale(${scale})`;

    /* movement */
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.position = "fixed";
    noBtn.style.left = Math.random()*maxX + "px";
    noBtn.style.top = Math.random()*maxY + "px";

    if(attempts === 10)
        document.querySelector("p").innerText = "it’s just a concert date.";

    if(attempts === 18)
        document.querySelector("p").innerText = "music is already waiting.";

    if(attempts === 25)
        noBtn.innerText = "hmm...";

    if(attempts === 35)
        noBtn.remove();
}

function yesClick(){

    document.body.innerHTML = `
    <div class="card">
        <div class="label-top">confirmed</div>
        <h1>see you at MOA Arena 🌊</h1>
        <div class="details">
            Wave to Earth – The Pieces Tour<br>
            Nov 15, 2026
        </div>
        <div style="font-size:50px;margin-top:20px;">🎧✨</div>
    </div>
    <canvas id="confetti"></canvas>
    `;

    launchConfetti();
}

function launchConfetti(){

    const canvas=document.getElementById("confetti");
    const ctx=canvas.getContext("2d");

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

    const pieces=[];

    for(let i=0;i<160;i++){
        pieces.push({
            x:canvas.width/2,
            y:canvas.height/2,
            dx:(Math.random()-0.5)*10,
            dy:(Math.random()-0.5)*10,
            size:Math.random()*6+2,
            color:`hsl(${Math.random()*360},60%,60%)`
        });
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        pieces.forEach(p=>{
            p.x+=p.dx;
            p.y+=p.dy;
            p.dy+=0.05;

            ctx.fillStyle=p.color;
            ctx.fillRect(p.x,p.y,p.size,p.size);
        });

        requestAnimationFrame(animate);
    }

    animate();
}

</script>

</body>
</html>
