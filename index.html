<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wave to Earth Invite</title>

<!-- ✅ FIXED FONT LINK -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background-image: url("wte.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

}

/* glass card */
.card{
    width:min(90%,520px);
    background:rgba(255, 255, 255, 0.08); /* ✅ MAS TRANSPARENT */
    backdrop-filter: blur(18px);          /* ✅ GLASS EFFECT */
    -webkit-backdrop-filter: blur(18px);  /* ✅ Safari */

    padding:35px;
    text-align:center;
    border-radius:20px;

    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);

    color:white;
    position:relative;
}


/* typography */
h1{
    font-family:'Playfair Display', serif;
    font-size:26px;
    margin-bottom:10px;
    color:#2c4a6b;
}

.details{
    font-size:14px;
    opacity:.75;
    margin-bottom:20px;
    color:#2c4a6b;
}

p{
    font-size:15px;
    opacity:.85;
    color:#2c4a6b;
}

#pleaText{
    font-size:22px;
    font-weight:600;
    margin-bottom:15px;
    letter-spacing:0.5px;
    
    color:#1e3a5f;
    text-shadow:
        0 2px 10px rgba(255,255,255,0.6);
     opacity:.95;
}

/* buttons */
.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

button{
    border:none;
    padding:12px 26px;
    border-radius:999px;
    font-size:15px;
    cursor:pointer;
    transition:.2s ease;
}

.yes{
    background:#4c6f91;
    color:white
}

.no{
    background:#e5e7eb;
    color:#111;
}

/* labels */
.label-top{
    position:absolute;
    top:12px;
    left:18px;
    font-size:12px;

    color:#2c4a6b; /* ✅ same blue */
    opacity:.6;

}

.label-bottom{
    position:absolute;
    bottom:12px;
    right:18px;
    font-size:12px;

    color:#2c4a6b;
    opacity:.6;
}

canvas{
    position:fixed;
    inset:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="card">

    <div class="label-top">wave to earth</div>
    <div class="label-bottom">the pieces tour</div>

    <h1>Concert Date Invite</h1>

    <div class="details">
        Wave to Earth – The Pieces Tour<br>
        Nov 15, 2026 • MOA Arena
    </div>

    <div id="pleaText">pls pookie 😫</div>

    <p>Do you want to go with me?</p>

    <div class="buttons">
        <button class="yes" id="yesBtn" onclick="yesClick()">YES</button>
        <button class="no" id="noBtn">NO</button>
    </div>

</div>

<canvas id="confetti"></canvas>

<script>

let attempts = 0;
let isMoving = false;

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const pleaText = document.getElementById("pleaText");
const moods = [
    "pls pookie 😫",
    "wag ka na mag NO 😭",
    "concert lang toh 😩",
    "isa lang naman 😔",
    "beh please HAHAHA",
    "last chance na toh 😤",
    "di mo ba ako mahal 😔",
    "sige naaaa 😫",
    "libre ko na food 😭",
    "pupunta na ako mag-isa 😔"
];

/* ✅ SINGLE EVENT (fix bug) */
noBtn.onclick = moveNo;

function moveNo(){

    if(isMoving) return;
    isMoving = true;

    setTimeout(() => isMoving = false, 250);

    attempts++;

    let index = Math.floor(Math.random()*moods.length);

    // ✅ avoid same text twice in a row
    while(pleaText.textContent === moods[index]){
        index = Math.floor(Math.random()*moods.length);
    }

    pleaText.textContent = moods[index];

    /* NO shrink */
    const shrink = Math.max(0.3, 1 - attempts*0.05);
    noBtn.style.transform = `scale(${shrink})`;

    /* YES exponential */
    const scale = Math.min(5, Math.pow(1.15, attempts));
    yesBtn.style.transform = `scale(${scale})`;

    /* movement */
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.position = "fixed";
    noBtn.style.left = Math.random()*maxX + "px";
    noBtn.style.top = Math.random()*maxY + "px";

    if(attempts === 10)
        document.querySelector("p").innerText = "it’s just a concert date.";

    if(attempts === 18)
        document.querySelector("p").innerText = "music is already waiting.";

    if(attempts === 25)
        noBtn.innerText = "hmm...";

    if(attempts === 35)
        noBtn.remove();
}

function yesClick(){
    
    document.body.innerHTML = `
    <div class="card fade-in">

        <h1 style="font-size:28px;color:#2c4a6b;">
            LETSGO 😭🎧
        </h1>

    </div>
    <canvas id="confetti"></canvas>
    `;

    launchConfetti();
}

function launchConfetti(){

    const canvas=document.getElementById("confetti");
    const ctx=canvas.getContext("2d");

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

    const pieces=[];

    for(let i=0;i<160;i++){
        pieces.push({
            x:canvas.width/2,
            y:canvas.height/2,
            dx:(Math.random()-0.5)*10,
            dy:(Math.random()-0.5)*10,
            size:Math.random()*6+2,
            color:`hsl(${Math.random()*360},60%,60%)`
        });
    }

    function animate(){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        pieces.forEach(p=>{
            p.x+=p.dx;
            p.y+=p.dy;
            p.dy+=0.05;

            ctx.fillStyle=p.color;
            ctx.fillRect(p.x,p.y,p.size,p.size);
        });

        requestAnimationFrame(animate);
    }

    animate();
}

</script>

</body>
</html>
